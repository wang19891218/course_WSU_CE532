<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FE Matrix Assembly Visualization</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f5f7fa; color: #333;
    padding: 20px; max-width: 1400px; margin: 0 auto;
  }
  h1 { text-align: center; margin-bottom: 6px; font-size: 1.5rem; }
  .subtitle { text-align: center; color: #666; margin-bottom: 18px; font-size: 0.9rem; }

  .layout { display: flex; gap: 20px; flex-wrap: wrap; }
  .panel {
    background: #fff; border-radius: 8px; padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .left-panel { flex: 0 0 320px; }
  .right-panel { flex: 1; min-width: 500px; }

  label { font-weight: 600; font-size: 0.85rem; display: block; margin-top: 10px; }
  label:first-child { margin-top: 0; }
  .input-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  input[type="number"] {
    width: 60px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 0.85rem;
  }
  .node-table, .elem-table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 0.82rem; }
  .node-table th, .elem-table th { background: #eef; padding: 4px 6px; text-align: center; }
  .node-table td, .elem-table td { padding: 3px 6px; text-align: center; border-bottom: 1px solid #eee; }
  .node-table input, .elem-table input { width: 50px; text-align: center; border: 1px solid #ddd; border-radius: 3px; padding: 2px; }
  .elem-table select { padding: 2px; font-size: 0.82rem; }

  button {
    margin-top: 12px; padding: 8px 16px; border: none; border-radius: 5px;
    cursor: pointer; font-size: 0.85rem; font-weight: 600;
  }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #e5e7eb; color: #333; }
  .btn-secondary:hover { background: #d1d5db; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Truss canvas */
  #truss-canvas { width: 100%; height: 220px; border: 1px solid #ddd; border-radius: 6px; background: #fafbfc; }

  /* Matrix display */
  .matrix-section { margin-top: 16px; overflow-x: auto; }
  .matrix-section h3 { font-size: 0.95rem; margin-bottom: 8px; }
  .matrix-grid {
    display: inline-grid; gap: 1px; background: #ccc; border: 2px solid #333;
    border-radius: 4px; overflow: hidden;
  }
  .matrix-cell {
    min-width: 28px; height: 24px; padding: 0 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-family: 'Courier New', monospace; background: #fff;
    transition: background-color 0.4s ease; white-space: nowrap;
  }
  .matrix-grid.compact .matrix-cell { min-width: 22px; height: 20px; font-size: 0.55rem; padding: 0 1px; }
  .matrix-cell.header-row { background: #e8edf3; font-weight: 700; font-size: 0.7rem; }
  .matrix-cell.header-col { background: #e8edf3; font-weight: 700; font-size: 0.7rem; }
  .matrix-cell.corner { background: #d0d5dd; }
  .matrix-cell.highlight { animation: pulse 0.6s ease; }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  /* Element legend */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; font-size: 0.82rem; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid #aaa; }

  /* Step controls */
  .step-controls { display: flex; gap: 8px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
  .step-info { font-size: 0.85rem; color: #555; margin-left: 8px; }

  /* Element stiffness display */
  .elem-k-section { margin-top: 14px; }
  .elem-k-section h4 { font-size: 0.88rem; margin-bottom: 6px; }
</style>
</head>
<body>

<h1>Finite Element Matrix Assembly</h1>
<p class="subtitle">CE/ME 532 &mdash; Interactive Visualization of the Direct Stiffness Method</p>

<div class="layout">
  <!-- Left panel: inputs -->
  <div class="panel left-panel">
    <label>Preset Examples</label>
    <div class="btn-group" style="margin-top:6px">
      <button class="btn-secondary" onclick="loadPreset('2bar')">2-Bar</button>
      <button class="btn-secondary" onclick="loadPreset('triangle')">3-Bar Triangle</button>
      <button class="btn-secondary" onclick="loadPreset('4bar')">4-Bar Truss</button>
      <button class="btn-secondary" onclick="loadPreset('10bar')">10-Bar Truss</button>
    </div>

    <label>Nodes (coordinates)</label>
    <table class="node-table" id="node-table">
      <thead><tr><th>Node</th><th>x</th><th>y</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="btn-group" style="margin-top:6px">
      <button class="btn-secondary" onclick="addNode()">+ Node</button>
      <button class="btn-secondary" onclick="removeNode()">- Node</button>
    </div>

    <label>Elements (connectivity)</label>
    <table class="elem-table" id="elem-table">
      <thead><tr><th>Elem</th><th>Node i</th><th>Node j</th><th>AE</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="btn-group" style="margin-top:6px">
      <button class="btn-secondary" onclick="addElement()">+ Element</button>
      <button class="btn-secondary" onclick="removeElement()">- Element</button>
    </div>

    <button class="btn-primary" style="width:100%; margin-top:14px" onclick="buildAndVisualize()">
      Build &amp; Visualize Assembly
    </button>
  </div>

  <!-- Right panel: visualization -->
  <div class="panel right-panel">
    <canvas id="truss-canvas"></canvas>

    <div class="step-controls">
      <button class="btn-secondary" id="btn-prev" onclick="stepPrev()">&#9664; Prev</button>
      <button class="btn-primary" id="btn-next" onclick="stepNext()">Next &#9654;</button>
      <button class="btn-secondary" onclick="stepReset()">Reset</button>
      <button class="btn-secondary" id="btn-all" onclick="stepAll()">Show All</button>
      <span class="step-info" id="step-info">Press "Build & Visualize" to start.</span>
    </div>

    <div class="legend" id="legend"></div>

    <div class="elem-k-section" id="elem-k-section"></div>

    <div class="matrix-section">
      <h3>System Stiffness Matrix K<sub>sys</sub></h3>
      <div class="matrix-grid" id="k-sys-grid"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  DATA
// ============================================================
let nodes = [];    // [{x, y}, ...]
let elements = []; // [{ni, nj, AE}, ...]
const ELEM_COLORS = [
  'rgba(59,130,246,0.25)',  //  1 blue
  'rgba(239,68,68,0.25)',   //  2 red
  'rgba(34,197,94,0.25)',   //  3 green
  'rgba(168,85,247,0.25)',  //  4 purple
  'rgba(245,158,11,0.25)',  //  5 amber
  'rgba(236,72,153,0.25)',  //  6 pink
  'rgba(20,184,166,0.25)',  //  7 teal
  'rgba(107,114,128,0.25)', //  8 gray
  'rgba(139,92,246,0.25)',  //  9 violet
  'rgba(6,182,212,0.25)',   // 10 cyan
  'rgba(217,119,6,0.25)',   // 11 orange
  'rgba(132,204,22,0.25)',  // 12 lime
];
const ELEM_COLORS_SOLID = [
  '#3b82f6','#ef4444','#22c55e','#a855f7',
  '#f59e0b','#ec4899','#14b8a6','#6b7280',
  '#8b5cf6','#06b6d4','#d97706','#84cc16',
];

let Ndof = 0;
let assemblySteps = []; // [{elemIdx, kElem, dofMap, description}]
let currentStep = -1;
let KsysAccum = [];     // running sum

// ============================================================
//  PRESETS
// ============================================================
function loadPreset(name) {
  if (name === '2bar') {
    nodes = [{x:0,y:0},{x:1,y:0},{x:2,y:0}];
    elements = [{ni:0,nj:1,AE:1},{ni:1,nj:2,AE:1}];
  } else if (name === 'triangle') {
    nodes = [{x:0,y:0},{x:4,y:0},{x:2,y:3}];
    elements = [{ni:0,nj:1,AE:1},{ni:1,nj:2,AE:1},{ni:0,nj:2,AE:1}];
  } else if (name === '4bar') {
    nodes = [{x:0,y:0},{x:4,y:0},{x:4,y:3},{x:0,y:3}];
    elements = [{ni:0,nj:1,AE:1},{ni:1,nj:2,AE:1},{ni:0,nj:2,AE:1},{ni:0,nj:3,AE:1},{ni:3,nj:2,AE:1}];
  } else if (name === '10bar') {
    // Classic 10-bar planar truss (6 nodes, 10 members)
    //   4 ---- 2 ---- 0
    //   |  \   |  /   |
    //   |   \  | /    |
    //   5 ---- 3 ---- 1
    // Nodes: top row y=10, bottom row y=0; columns at x=0,10,20
    nodes = [
      {x:20, y:10},  // 1 (top-right)
      {x:20, y: 0},  // 2 (bot-right)
      {x:10, y:10},  // 3 (top-mid)
      {x:10, y: 0},  // 4 (bot-mid)
      {x: 0, y:10},  // 5 (top-left)
      {x: 0, y: 0},  // 6 (bot-left)
    ];
    elements = [
      {ni:0, nj:2, AE:1},  //  1: top 1-3
      {ni:2, nj:4, AE:1},  //  2: top 3-5
      {ni:1, nj:3, AE:1},  //  3: bot 2-4
      {ni:3, nj:5, AE:1},  //  4: bot 4-6
      {ni:0, nj:1, AE:1},  //  5: right 1-2
      {ni:2, nj:3, AE:1},  //  6: mid 3-4
      {ni:4, nj:5, AE:1},  //  7: left 5-6
      {ni:0, nj:3, AE:1},  //  8: diag 1-4
      {ni:2, nj:1, AE:1},  //  9: diag 3-2
      {ni:2, nj:5, AE:1},  // 10: diag 3-6
    ];
  }
  refreshTables();
  clearVisualization();
}

// ============================================================
//  TABLE UI
// ============================================================
function refreshTables() {
  // Nodes
  const ntb = document.querySelector('#node-table tbody');
  ntb.innerHTML = '';
  nodes.forEach((n, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${i+1}</td>
      <td><input type="number" step="any" value="${n.x}" onchange="nodes[${i}].x=+this.value"></td>
      <td><input type="number" step="any" value="${n.y}" onchange="nodes[${i}].y=+this.value"></td>`;
    ntb.appendChild(tr);
  });
  // Elements
  const etb = document.querySelector('#elem-table tbody');
  etb.innerHTML = '';
  elements.forEach((el, i) => {
    const tr = document.createElement('tr');
    const opts = nodes.map((_, ni) => `<option value="${ni}" ${ni===el.ni?'selected':''}>${ni+1}</option>`).join('');
    const opts2 = nodes.map((_, ni) => `<option value="${ni}" ${ni===el.nj?'selected':''}>${ni+1}</option>`).join('');
    tr.innerHTML = `<td style="color:${ELEM_COLORS_SOLID[i%8]};font-weight:700">${i+1}</td>
      <td><select onchange="elements[${i}].ni=+this.value">${opts}</select></td>
      <td><select onchange="elements[${i}].nj=+this.value">${opts2}</select></td>
      <td><input type="number" step="any" value="${el.AE}" onchange="elements[${i}].AE=+this.value" style="width:45px"></td>`;
    etb.appendChild(tr);
  });
}

function addNode() { nodes.push({x:0, y:0}); refreshTables(); }
function removeNode() { if (nodes.length > 2) { nodes.pop(); refreshTables(); } }
function addElement() { elements.push({ni:0, nj:1, AE:1}); refreshTables(); }
function removeElement() { if (elements.length > 1) { elements.pop(); refreshTables(); } }

// ============================================================
//  ELEMENT STIFFNESS
// ============================================================
function computeElemK(ni, nj, AE) {
  const dx = nodes[nj].x - nodes[ni].x;
  const dy = nodes[nj].y - nodes[ni].y;
  const L = Math.sqrt(dx*dx + dy*dy);
  const c = dx / L, s = dy / L;
  const coeff = AE / L;
  // k = (AE/L) * [c2 cs -c2 -cs; cs s2 -cs -s2; -c2 -cs c2 cs; -cs -s2 cs s2]
  const c2 = c*c, s2 = s*s, cs = c*s;
  return {
    k: [
      [ c2*coeff,  cs*coeff, -c2*coeff, -cs*coeff],
      [ cs*coeff,  s2*coeff, -cs*coeff, -s2*coeff],
      [-c2*coeff, -cs*coeff,  c2*coeff,  cs*coeff],
      [-cs*coeff, -s2*coeff,  cs*coeff,  s2*coeff],
    ],
    L, c, s
  };
}

// ============================================================
//  BUILD ASSEMBLY STEPS
// ============================================================
function buildAndVisualize() {
  Ndof = nodes.length * 2;
  assemblySteps = [];
  KsysAccum = Array.from({length: Ndof}, () => Array(Ndof).fill(0));

  elements.forEach((el, e) => {
    const {k} = computeElemK(el.ni, el.nj, el.AE);
    const NN1 = 2 * el.ni;
    const NN2 = 2 * el.nj;
    const dofMap = [NN1, NN1+1, NN2, NN2+1];
    assemblySteps.push({
      elemIdx: e,
      kElem: k,
      dofMap,
      description: `Element ${e+1} (nodes ${el.ni+1}\u2013${el.nj+1}): global DOFs [${dofMap.map(d=>d+1).join(', ')}]`
    });
  });

  currentStep = -1;
  // Reset Ksys display
  renderKsysGrid();
  drawTruss(-1);
  renderLegend();
  updateStepInfo();
  document.getElementById('elem-k-section').innerHTML = '';
}

// ============================================================
//  STEP CONTROLS
// ============================================================
function stepNext() {
  if (assemblySteps.length === 0) return;
  if (currentStep < assemblySteps.length - 1) {
    currentStep++;
    applyStep(currentStep);
  }
}
function stepPrev() {
  if (currentStep >= 0) {
    currentStep--;
    rebuildUpToStep(currentStep);
  }
}
function stepReset() {
  currentStep = -1;
  KsysAccum = Array.from({length: Ndof}, () => Array(Ndof).fill(0));
  renderKsysValues([]);
  drawTruss(-1);
  updateStepInfo();
  document.getElementById('elem-k-section').innerHTML = '';
}
function stepAll() {
  KsysAccum = Array.from({length: Ndof}, () => Array(Ndof).fill(0));
  let allCells = [];
  for (let s = 0; s < assemblySteps.length; s++) {
    const step = assemblySteps[s];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++) {
        const gr = step.dofMap[r], gc = step.dofMap[c];
        KsysAccum[gr][gc] += step.kElem[r][c];
        allCells.push({r: gr, c: gc, elemIdx: step.elemIdx});
      }
  }
  currentStep = assemblySteps.length - 1;
  renderKsysValues(allCells);
  drawTruss(currentStep);
  updateStepInfo();
  showElemK(currentStep);
}

function applyStep(stepIdx) {
  const step = assemblySteps[stepIdx];
  const cells = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      const gr = step.dofMap[r], gc = step.dofMap[c];
      KsysAccum[gr][gc] += step.kElem[r][c];
      cells.push({r: gr, c: gc, elemIdx: step.elemIdx});
    }
  renderKsysValues(cells);
  drawTruss(stepIdx);
  updateStepInfo();
  showElemK(stepIdx);
}

function rebuildUpToStep(upTo) {
  KsysAccum = Array.from({length: Ndof}, () => Array(Ndof).fill(0));
  let lastCells = [];
  for (let s = 0; s <= upTo; s++) {
    const step = assemblySteps[s];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++) {
        const gr = step.dofMap[r], gc = step.dofMap[c];
        KsysAccum[gr][gc] += step.kElem[r][c];
        if (s === upTo) lastCells.push({r: gr, c: gc, elemIdx: step.elemIdx});
      }
  }
  renderKsysValues(upTo >= 0 ? lastCells : []);
  drawTruss(upTo);
  updateStepInfo();
  if (upTo >= 0) showElemK(upTo); else document.getElementById('elem-k-section').innerHTML = '';
}

function updateStepInfo() {
  const info = document.getElementById('step-info');
  if (assemblySteps.length === 0) {
    info.textContent = 'Press "Build & Visualize" to start.';
  } else if (currentStep < 0) {
    info.textContent = `Step 0 / ${assemblySteps.length}: K_sys initialized to zeros.`;
  } else {
    info.textContent = `Step ${currentStep+1} / ${assemblySteps.length}: ${assemblySteps[currentStep].description}`;
  }
}

// ============================================================
//  RENDER K_SYS GRID
// ============================================================
function renderKsysGrid() {
  const grid = document.getElementById('k-sys-grid');
  grid.innerHTML = '';
  const n = Ndof;
  grid.style.gridTemplateColumns = `repeat(${n+1}, auto)`;
  grid.classList.toggle('compact', n > 8);

  // Corner cell
  const corner = document.createElement('div');
  corner.className = 'matrix-cell corner';
  grid.appendChild(corner);
  // Column headers
  for (let c = 0; c < n; c++) {
    const h = document.createElement('div');
    h.className = 'matrix-cell header-row';
    const nodeNum = Math.floor(c/2) + 1;
    const dofName = c % 2 === 0 ? 'u' : 'v';
    h.textContent = `${dofName}${nodeNum}`;
    grid.appendChild(h);
  }
  // Rows
  for (let r = 0; r < n; r++) {
    // Row header
    const rh = document.createElement('div');
    rh.className = 'matrix-cell header-col';
    const nodeNum = Math.floor(r/2) + 1;
    const dofName = r % 2 === 0 ? 'u' : 'v';
    rh.textContent = `${dofName}${nodeNum}`;
    grid.appendChild(rh);
    // Data cells
    for (let c = 0; c < n; c++) {
      const cell = document.createElement('div');
      cell.className = 'matrix-cell';
      cell.id = `kcell-${r}-${c}`;
      cell.textContent = '0';
      grid.appendChild(cell);
    }
  }
}

function renderKsysValues(highlightCells) {
  const highlightSet = new Set(highlightCells.map(h => `${h.r}-${h.c}`));
  // Build color map: for each cell, which elements contribute
  const cellElems = {};
  for (let s = 0; s <= currentStep && s < assemblySteps.length; s++) {
    const step = assemblySteps[s];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++) {
        const key = `${step.dofMap[r]}-${step.dofMap[c]}`;
        if (!cellElems[key]) cellElems[key] = new Set();
        cellElems[key].add(step.elemIdx);
      }
  }

  for (let r = 0; r < Ndof; r++) {
    for (let c = 0; c < Ndof; c++) {
      const cell = document.getElementById(`kcell-${r}-${c}`);
      if (!cell) continue;
      const val = KsysAccum[r][c];
      cell.textContent = Math.abs(val) < 1e-12 ? '0' : val.toFixed(3);
      // Color blending
      const key = `${r}-${c}`;
      const elems = cellElems[key];
      if (elems && elems.size > 0) {
        const colors = [...elems].map(e => ELEM_COLORS[e % 8]);
        cell.style.background = blendColors(colors);
      } else {
        cell.style.background = '#fff';
      }
      // Highlight animation
      if (highlightSet.has(key)) {
        cell.classList.remove('highlight');
        void cell.offsetWidth; // reflow
        cell.classList.add('highlight');
      }
    }
  }
}

function blendColors(rgbaStrings) {
  // Simple overlay blending on white
  let rr = 255, gg = 255, bb = 255;
  for (const s of rgbaStrings) {
    const m = s.match(/rgba?\((\d+),(\d+),(\d+),([\d.]+)\)/);
    if (!m) continue;
    const cr = +m[1], cg = +m[2], cb = +m[3], a = +m[4];
    rr = rr * (1-a) + cr * a;
    gg = gg * (1-a) + cg * a;
    bb = bb * (1-a) + cb * a;
  }
  return `rgb(${Math.round(rr)},${Math.round(gg)},${Math.round(bb)})`;
}

// ============================================================
//  SHOW ELEMENT K
// ============================================================
function showElemK(stepIdx) {
  const sec = document.getElementById('elem-k-section');
  const step = assemblySteps[stepIdx];
  const e = step.elemIdx;
  const color = ELEM_COLORS_SOLID[e % 8];
  const dofs = step.dofMap;
  const dofLabels = dofs.map(d => {
    const nodeNum = Math.floor(d/2)+1;
    return (d%2===0?'u':'v') + nodeNum;
  });

  let html = `<h4 style="color:${color}">Element ${e+1} stiffness k<sup>(${e+1})</sup> &rarr; global DOFs [${dofLabels.join(', ')}]</h4>`;
  html += '<table style="border-collapse:collapse;font-size:0.78rem;font-family:monospace">';
  html += '<tr><td></td>' + dofLabels.map(l => `<td style="padding:2px 6px;font-weight:700;text-align:center">${l}</td>`).join('') + '</tr>';
  for (let r = 0; r < 4; r++) {
    html += `<tr><td style="padding:2px 6px;font-weight:700">${dofLabels[r]}</td>`;
    for (let c = 0; c < 4; c++) {
      const v = step.kElem[r][c];
      html += `<td style="padding:2px 8px;text-align:right;background:${ELEM_COLORS[e%8]}">${v.toFixed(3)}</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';
  sec.innerHTML = html;
}

// ============================================================
//  LEGEND
// ============================================================
function renderLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  elements.forEach((_, i) => {
    const item = document.createElement('span');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-swatch" style="background:${ELEM_COLORS_SOLID[i%8]}; opacity:0.5"></span> Elem ${i+1}`;
    leg.appendChild(item);
  });
}

// ============================================================
//  DRAW TRUSS ON CANVAS
// ============================================================
function drawTruss(activeStep) {
  const canvas = document.getElementById('truss-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth - 32;
  canvas.width = W; canvas.height = 220;
  const H = 220;
  ctx.clearRect(0, 0, W, H);

  if (nodes.length === 0) return;

  // Compute bounds
  let xmin = Infinity, xmax = -Infinity, ymin = Infinity, ymax = -Infinity;
  nodes.forEach(n => { xmin = Math.min(xmin, n.x); xmax = Math.max(xmax, n.x); ymin = Math.min(ymin, n.y); ymax = Math.max(ymax, n.y); });
  const dx = xmax - xmin || 1, dy = ymax - ymin || 1;
  const pad = 40;
  const scale = Math.min((W - 2*pad) / dx, (H - 2*pad) / dy);
  const ox = pad + ((W - 2*pad) - dx*scale) / 2;
  const oy = H - pad - ((H - 2*pad) - dy*scale) / 2;

  function tx(x) { return ox + (x - xmin) * scale; }
  function ty(y) { return oy - (y - ymin) * scale; }

  // Draw elements
  elements.forEach((el, i) => {
    const isActive = (activeStep >= 0 && i <= assemblySteps[Math.min(activeStep, assemblySteps.length-1)].elemIdx);
    const isCurrent = (activeStep >= 0 && assemblySteps[activeStep].elemIdx === i);
    ctx.beginPath();
    ctx.moveTo(tx(nodes[el.ni].x), ty(nodes[el.ni].y));
    ctx.lineTo(tx(nodes[el.nj].x), ty(nodes[el.nj].y));
    ctx.strokeStyle = isActive ? ELEM_COLORS_SOLID[i%8] : '#ccc';
    ctx.lineWidth = isCurrent ? 4 : 2;
    ctx.stroke();
    // Element label
    const mx = (tx(nodes[el.ni].x) + tx(nodes[el.nj].x)) / 2;
    const my = (ty(nodes[el.ni].y) + ty(nodes[el.nj].y)) / 2;
    ctx.fillStyle = isActive ? ELEM_COLORS_SOLID[i%8] : '#aaa';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`[${i+1}]`, mx + 10, my - 6);
  });

  // Draw nodes
  nodes.forEach((n, i) => {
    ctx.beginPath();
    ctx.arc(tx(n.x), ty(n.y), 6, 0, 2*Math.PI);
    ctx.fillStyle = '#333';
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${i+1}`, tx(n.x), ty(n.y) - 12);
  });
}

// ============================================================
//  CLEAR
// ============================================================
function clearVisualization() {
  assemblySteps = [];
  currentStep = -1;
  document.getElementById('k-sys-grid').innerHTML = '';
  document.getElementById('legend').innerHTML = '';
  document.getElementById('elem-k-section').innerHTML = '';
  document.getElementById('step-info').textContent = 'Press "Build & Visualize" to start.';
  drawTruss(-1);
}

// ============================================================
//  INIT
// ============================================================
loadPreset('triangle');
</script>
